name: build-kernel-hack-cfi
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: build kernel-hack + CFI stub
        shell: bash
        run: |
          set +e
          {
            sudo apt-get update -qq && sudo apt-get install -y -qq bc bison flex libssl-dev make git zip python3 libncurses-dev device-tree-compiler ccache kmod >/dev/null 2>&1
            git clone -b lineage-23.2 https://github.com/LineageOS/android_kernel_samsung_sm6115 kernel 2>&1 | tail -2
            ( cd kernel && git checkout 2e673e4df899 2>&1 | tail -1 )
            git clone --depth=1 https://github.com/kdrag0n/proton-clang clang 2>&1 | tail -1
            export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
            ARGS="O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-"
            cd kernel
            git config user.email ci@local; git config user.name ci
            VH=$(find include -name vermagic.h | head -1)
            sed -i 's/#define MODULE_VERMAGIC_MODVERSIONS ""/#define MODULE_VERMAGIC_MODVERSIONS "modversions "/' "$VH"
            git update-index --assume-unchanged "$VH"
            echo "### STUB CFI: exporta __cfi_slowpath (modulos stock precisam)"
            printf '\n#ifndef CONFIG_CFI_CLANG\nvoid __cfi_slowpath(u64 id, void *ptr) { }\nEXPORT_SYMBOL(__cfi_slowpath);\nvoid __cfi_slowpath_diag(u64 id, void *ptr, void *diag) { }\nEXPORT_SYMBOL(__cfi_slowpath_diag);\n#endif\n' >> kernel/module.c
            git update-index --assume-unchanged kernel/module.c
            tail -7 kernel/module.c
            echo "### FIX PREL32 (robusto): struct kernel_symbol stock=16B (PREL32 off). Forca OFF."
            PK=$(grep -rln "^config HAVE_ARCH_PREL32_RELOCATIONS" --include=Kconfig . | head -1)
            echo "## arquivo da definicao: $PK"
            echo "## stanza ANTES:"
            awk '/^config HAVE_ARCH_PREL32_RELOCATIONS/{p=1;print;next} p&&/^config /{exit} p{print}' "$PK"
            echo "## quem SELECT-a:"; grep -rln "select HAVE_ARCH_PREL32_RELOCATIONS" --include=Kconfig . || echo "(ninguem)"
            # patch 1: depends on BROKEN logo apos a definicao (BROKEN nunca setado -> simbolo OFF, independe de def_bool/default)
            sed -i '/^config HAVE_ARCH_PREL32_RELOCATIONS/a\	depends on BROKEN' "$PK"
            git update-index --assume-unchanged "$PK"
            # patch 2: remove qualquer 'select' dele (select ignora depends)
            for f in $(grep -rln "select HAVE_ARCH_PREL32_RELOCATIONS" --include=Kconfig .); do
              sed -i '/select HAVE_ARCH_PREL32_RELOCATIONS/d' "$f"; git update-index --assume-unchanged "$f"
            done
            echo "## stanza DEPOIS:"
            awk '/^config HAVE_ARCH_PREL32_RELOCATIONS/{p=1;print;next} p&&/^config /{exit} p{print}' "$PK"
            mkdir -p out
            gunzip -c "$GITHUB_WORKSPACE/stock-config.gz" > out/.config
            ./scripts/config --file out/.config -d MODVERSIONS -e SYSVIPC -e PID_NS -e IPC_NS
            make $ARGS olddefconfig > /tmp/cfg.log 2>&1
            echo "config (PREL32 DEVE estar 'is not set'):"; grep -E 'CONFIG_MODVERSIONS|CONFIG_PID_NS=|CONFIG_IPC_NS=|CONFIG_CFI|PREL32' out/.config
            if grep -q '^CONFIG_HAVE_ARCH_PREL32_RELOCATIONS=y' out/.config; then echo "### ERRO FATAL: PREL32 ainda LIGADO apos patch -> nao adianta buildar, abortando"; exit 1; fi
            echo "### OK: PREL32 DESLIGADO (struct 16 bytes) -> segue build"
            echo "### build Image.gz"
            make $ARGS -j$(nproc) Image.gz > /tmp/k.log 2>&1
            echo "Image.gz exit=$?"; grep -iE 'error:' /tmp/k.log | grep -vi warning | head -8; tail -3 /tmp/k.log
            echo "### kernel.release:"; cat out/include/config/kernel.release 2>/dev/null
            echo "### __cfi_slowpath exportado? (deve aparecer)"; grep -w __cfi_slowpath out/Module.symvers 2>/dev/null || echo "(Module.symvers nao tem - mas MODVERSIONS off, ok se compilou)"
            grep -w __cfi_slowpath out/System.map 2>/dev/null && echo "no System.map -> exportado OK"
            cd ..
          } 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: collect + push
        if: always()
        shell: bash
        run: |
          mkdir -p /tmp/out
          tail -40 build.log > /tmp/out/RESULTADO.log
          if [ -f kernel/out/arch/arm64/boot/Image.gz ]; then cp kernel/out/arch/arm64/boot/Image.gz /tmp/out/; echo "KERNEL OK" > /tmp/out/STATUS.txt; else echo "SEM Image.gz" > /tmp/out/STATUS.txt; fi
          cd /tmp/out
          git init -q; git config user.email ci@local; git config user.name ci
          git checkout -b build-output
          git add -A; git commit -q -m "kernel-hack cfi [skip ci]"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" build-output
